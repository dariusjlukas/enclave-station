services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-chatapp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatapp}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-chatapp}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      BACKEND_PORT: 9001
      SESSION_EXPIRY_HOURS: ${SESSION_EXPIRY_HOURS:-168}
      PUBLIC_URL: ${PUBLIC_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9001:9001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:z
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
